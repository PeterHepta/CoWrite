<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>CoWrite</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link href="https://unpkg.com/quill-emoji/dist/quill-emoji.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap');
        :root {
            --matcha-bg: #f0f4ee;
            --matcha-surface: #f7f9f5;
            --matcha-card: #ffffff;
            --matcha-border: #dde8d8;
            --matcha-border-light: #e8f0e4;
            --matcha-accent: #5a7a4a;
            --matcha-accent-hover: #4a6a3a;
            --matcha-accent-light: #eaf2e5;
            --matcha-text: #2c3a28;
            --matcha-text-secondary: #6b7f64;
            --matcha-text-muted: #9aaa94;
            --matcha-green: #4a8c5c;
            --matcha-green-light: #e4f2e8;
            --matcha-yellow: #8a7a2a;
            --matcha-yellow-light: #f5f0dc;
        }
        body { font-family: 'Inter', 'Noto Serif SC', 'Source Han Serif SC', 'Source Han Serif CN', serif; padding: 20px; background: var(--matcha-bg); margin: 0; color: var(--matcha-text); }
        .main-container { display: flex; flex-direction: column; height: 92vh; max-width: 1000px; margin: 0 auto; gap: 10px; }
        .panel { background: var(--matcha-card); border-radius: 8px; box-shadow: 0 1px 4px rgba(60,80,50,0.08); }
        .status-header {
            display: flex; align-items: stretch; gap: 0;
            padding: 0; overflow: visible;
            border-bottom: none; margin-bottom: 0;
            border-radius: 8px;
        }
        .status-section {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 16px;
        }
        .status-section + .status-section {
            border-left: 1px solid var(--matcha-border-light);
        }
        .status-section-brand { min-width: 90px; }
        .status-section-brand .brand-name {
            font-size: 15px; font-weight: 700; color: var(--matcha-text); letter-spacing: -0.2px;
        }
        .status-section-doc { flex: 1; }
        .status-section-user { gap: 6px; }
        .status-pill {
            display: inline-flex; align-items: center; gap: 4px;
            background: var(--matcha-surface); border-radius: 20px;
            padding: 3px 10px; font-size: 12px; color: var(--matcha-text-secondary); white-space: nowrap;
        }
        .status-pill.online { background: var(--matcha-green-light); color: var(--matcha-green); }
        .status-pill.waiting { background: var(--matcha-yellow-light); color: var(--matcha-yellow); }

        /* 编辑器+图形层容器 */
        #editor-wrap {
            flex: 1; position: relative; display: flex; flex-direction: column;
            border: 1px solid var(--matcha-border); border-radius: 0 0 8px 8px; background: var(--matcha-card);
            overflow: hidden;
        }
        #editor-container {
            flex: 1; font-size: 16px; background: var(--matcha-card);
            border: none !important; border-radius: 0 !important;
            overflow: hidden;
        }
        /* shape-canvas 仅在放置模式显示，平时隐藏且不拦截事件 */
        #shape-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
            display: none;
        }
        #shape-canvas.placing { display: block; pointer-events: all; cursor: crosshair; }
        /* 图形工具栏 */
        #shape-toolbar {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 12px;
            background: var(--matcha-surface);
            border-bottom: 1px solid var(--matcha-border-light);
            flex-shrink: 0;
        }
        #shape-toolbar .stb-label {
            font-size: 12px; color: var(--matcha-text-muted); white-space: nowrap;
        }
        .shape-btn {
            width: 32px; height: 32px;
            border: 1.5px solid var(--matcha-border); border-radius: 6px;
            background: var(--matcha-card); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: border-color .15s, background .15s;
            padding: 0; flex-shrink: 0;
        }
        .shape-btn:hover { border-color: var(--matcha-accent); background: var(--matcha-accent-light); }
        .shape-btn.active { border-color: var(--matcha-accent); background: var(--matcha-accent-light); }
        .shape-btn svg { width: 18px; height: 18px; }
        .stb-sep { width: 1px; height: 20px; background: var(--matcha-border-light); margin: 0 2px; }

        /* 图形 DOM 元素：放在 editor-wrap 内，绝对定位 */
        .shape-el {
            position: absolute;
            cursor: grab;
            z-index: 5;
            user-select: none;
            -webkit-user-select: none;
            box-sizing: border-box;
            pointer-events: all;
        }
        .shape-el.selected { outline: 2px dashed var(--matcha-accent); outline-offset: 1px; }
        .shape-el canvas { display: block; width: 100%; height: 100%; pointer-events: none; }
        /* 缩放把手 */
        .shape-handle {
            position: absolute;
            width: 10px; height: 10px;
            background: white; border: 2px solid var(--matcha-accent);
            border-radius: 2px;
            cursor: nwse-resize; z-index: 20;
            pointer-events: all;
            display: none;
        }
        .shape-el.selected .shape-handle { display: block; }
        .shape-handle.tl { top: -5px; left: -5px; cursor: nwse-resize; }
        .shape-handle.tr { top: -5px; right: -5px; cursor: nesw-resize; }
        .shape-handle.bl { bottom: -5px; left: -5px; cursor: nesw-resize; }
        .shape-handle.br { bottom: -5px; right: -5px; cursor: nwse-resize; }

        .ql-toolbar.ql-snow { border-radius: 8px 8px 0 0; border: 1px solid var(--matcha-border); background: var(--matcha-surface); border-bottom: none; }
        .ql-toolbar.ql-snow .ql-formats { margin-right: 12px; vertical-align: middle; }
        .ql-toolbar.ql-snow button, .ql-toolbar.ql-snow .ql-picker { font-family: 'Inter', 'Noto Serif SC', serif; }
        .ql-editor { font-family: 'Inter', 'Noto Serif SC', 'Source Han Serif SC', 'Source Han Serif CN', serif !important; font-size: 16px; }
        .ql-editor.ql-blank::before { font-family: 'Inter', 'Noto Serif SC', serif; font-style: normal; color: var(--matcha-text-muted); }
        #log { display: none; }

        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--matcha-bg);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .auth-page {
            width: 380px;
            display: flex; flex-direction: column; align-items: center; gap: 0;
        }
        .auth-logo { margin-bottom: 32px; text-align: center; }
        .auth-logo .logo-icon {
            width: 52px; height: 52px; background: var(--matcha-accent); border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 12px auto;
            box-shadow: 0 4px 16px rgba(90,122,74,0.3);
        }
        .auth-logo .logo-icon svg { width: 28px; height: 28px; fill: white; }
        .auth-logo h1 { font-size: 22px; font-weight: 700; color: var(--matcha-text); margin: 0 0 4px 0; letter-spacing: -0.3px; }
        .auth-logo p { font-size: 13px; color: var(--matcha-text-muted); margin: 0; }
        .auth-card {
            background: var(--matcha-card); border-radius: 16px; box-shadow: 0 2px 20px rgba(60,80,50,0.1);
            width: 100%; overflow: hidden;
        }
        .auth-tabs { display: flex; border-bottom: 1px solid var(--matcha-border-light); }
        .auth-tab {
            flex: 1; padding: 16px; text-align: center; font-size: 14px; font-weight: 600;
            color: var(--matcha-text-muted); cursor: pointer; border: none; background: none;
            border-bottom: 2px solid transparent; margin-bottom: -1px;
            transition: color 0.2s, border-color 0.2s;
        }
        .auth-tab.active { color: var(--matcha-accent); border-bottom-color: var(--matcha-accent); }
        .auth-form { padding: 28px; display: flex; flex-direction: column; gap: 14px; }
        .auth-form input {
            padding: 13px 14px; border: 1.5px solid var(--matcha-border); border-radius: 10px;
            font-size: 15px; outline: none; background: var(--matcha-surface); transition: border-color 0.2s, background 0.2s;
            color: var(--matcha-text); font-family: inherit;
        }
        .auth-form input:focus { border-color: var(--matcha-accent); background: white; }
        .auth-form input::placeholder { color: var(--matcha-text-muted); }
        .auth-submit {
            padding: 14px; border: none; border-radius: 10px; font-size: 15px;
            cursor: pointer; font-weight: 600; transition: opacity 0.2s, transform 0.15s;
            background: var(--matcha-accent); color: white; margin-top: 4px; font-family: inherit;
        }
        .auth-submit:hover { opacity: 0.9; transform: translateY(-1px); }
        .auth-submit:active { transform: translateY(0); }

        #btn-logout {
            background: none; color: #c0483a; border: 1px solid #c0483a; border-radius: 6px;
            padding: 4px 10px; font-size: 12px; cursor: pointer; display: none; font-family: inherit;
        }
        #btn-logout:hover { background: #c0483a; color: white; }
        .action-btn {
            background: none; border: 1px solid var(--matcha-border); border-radius: 6px;
            padding: 4px 10px; font-size: 12px; cursor: pointer; color: var(--matcha-text-secondary); white-space: nowrap;
            display: none; align-items: center; gap: 4px; font-family: inherit;
        }
        .action-btn:hover { background: var(--matcha-accent-light); }
        .action-btn.orange { border-color: #b08a2a; color: #b08a2a; }
        .action-btn.orange:hover { background: #b08a2a; color: white; }
        .action-btn.blue { border-color: var(--matcha-accent); color: var(--matcha-accent); }
        .action-btn.blue:hover { background: var(--matcha-accent); color: white; }

        .flow-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--matcha-bg);
            display: none; justify-content: center; align-items: center; z-index: 9999;
        }
        .flow-page { width: 380px; display: flex; flex-direction: column; align-items: center; }
        .flow-header { margin-bottom: 28px; text-align: center; }
        .flow-header .flow-icon {
            width: 48px; height: 48px; border-radius: 13px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 10px auto; font-size: 22px;
            box-shadow: 0 4px 14px rgba(60,80,50,0.12);
        }
        .flow-header h2 { font-size: 20px; font-weight: 700; color: var(--matcha-text); margin: 0 0 4px 0; letter-spacing: -0.3px; }
        .flow-header p { font-size: 13px; color: var(--matcha-text-muted); margin: 0; }
        .flow-card {
            background: var(--matcha-card); border-radius: 16px; box-shadow: 0 2px 20px rgba(60,80,50,0.1);
            width: 100%; padding: 24px; display: flex; flex-direction: column; gap: 10px;
        }
        .flow-card input {
            padding: 13px 14px; border: 1.5px solid var(--matcha-border); border-radius: 10px;
            font-size: 15px; outline: none; background: var(--matcha-surface); transition: border-color 0.2s, background 0.2s;
            color: var(--matcha-text); width: 100%; box-sizing: border-box; font-family: inherit;
        }
        .flow-card input:focus { border-color: var(--matcha-accent); background: white; }
        .flow-card input::placeholder { color: var(--matcha-text-muted); }
        .flow-btn {
            padding: 13px 14px; border: none; border-radius: 10px; font-size: 15px;
            cursor: pointer; font-weight: 600; transition: opacity 0.2s, transform 0.15s;
            width: 100%; text-align: center; font-family: inherit;
        }
        .flow-btn:hover { opacity: 0.88; transform: translateY(-1px); }
        .flow-btn:active { transform: translateY(0); }
        .flow-btn-primary { background: var(--matcha-accent); color: white; }
        .flow-btn-green { background: var(--matcha-green); color: white; }
        .flow-btn-secondary { background: var(--matcha-surface); color: var(--matcha-text-secondary); border: 1px solid var(--matcha-border); }
        .flow-btn-secondary:hover { background: var(--matcha-accent-light); opacity: 1; }
        .flow-divider { height: 1px; background: var(--matcha-border-light); margin: 4px 0; }
        .flow-hint { font-size: 13px; color: var(--matcha-text-muted); text-align: center; margin: 0; }

        #invite-code-display, #gen-invite-code-display {
            font-size: 30px; letter-spacing: 8px; color: var(--matcha-accent);
            font-family: 'SF Mono', 'Fira Code', monospace; font-weight: 700;
            background: var(--matcha-accent-light); padding: 14px 20px; border-radius: 12px;
            text-align: center; border: 1.5px solid var(--matcha-border);
        }
        #input-invite-code {
            font-size: 22px; font-family: 'SF Mono', 'Fira Code', monospace; letter-spacing: 6px;
            text-align: center; text-transform: uppercase;
        }
        #timed-options select {
            width: 100%; padding: 12px 14px; border: 1.5px solid var(--matcha-border); border-radius: 10px;
            font-size: 14px; outline: none; background: var(--matcha-surface); color: var(--matcha-text);
            appearance: none; cursor: pointer; font-family: inherit;
        }
        #timed-options { display: flex; flex-direction: column; gap: 10px; }

        #ql-custom-placeholder {
            position: absolute; top: 0; left: 0;
            padding: 12px 15px;
            color: var(--matcha-text-muted); font-size: 16px;
            pointer-events: none; user-select: none;
        }
        .room-card {
            display: flex; flex-direction: column; gap: 4px;
            padding: 14px 16px; border: 1.5px solid var(--matcha-border); border-radius: 10px;
            cursor: pointer; background: var(--matcha-surface);
            transition: border-color .18s, background .18s;
        }
        .room-card:hover { border-color: var(--matcha-accent); background: var(--matcha-accent-light); }
        .room-card-name { font-size: 15px; font-weight: 600; color: var(--matcha-text); }
        .room-card-meta { font-size: 12px; color: var(--matcha-text-muted); display: flex; gap: 12px; flex-wrap: wrap; }

        #members-panel {
            position: fixed; top: auto; left: auto; margin-top: 4px;
            background: var(--matcha-card); border-radius: 10px; box-shadow: 0 4px 20px rgba(60,80,50,0.13);
            border: 1px solid var(--matcha-border); min-width: 220px; z-index: 1000;
            display: none; flex-direction: column; overflow: hidden;
        }
        #members-panel.open { display: flex; }
        .members-panel-header {
            padding: 10px 14px 8px; font-size: 12px; font-weight: 600;
            color: var(--matcha-text-muted); border-bottom: 1px solid var(--matcha-border-light); background: var(--matcha-surface);
        }
        .members-list { max-height: 220px; overflow-y: auto; padding: 6px 0; }
        .member-item {
            display: flex; align-items: center; gap: 8px;
            padding: 7px 14px; font-size: 13px; color: var(--matcha-text);
        }
        .member-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .member-dot.in-room  { background: var(--matcha-green); }
        .member-dot.online   { background: var(--matcha-accent); }
        .member-dot.offline  { background: var(--matcha-text-muted); }
        .member-status-label { font-size: 11px; color: var(--matcha-text-muted); margin-left: auto; white-space: nowrap; }
        .member-owner-tag {
            font-size: 10px; color: #b08a2a; border: 1px solid #b08a2a;
            border-radius: 4px; padding: 0px 4px; vertical-align: middle; margin-left: 4px;
        }
        /* 图形工具提示 */
        #shape-hint {
            position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
            background: rgba(44,58,40,0.75); color: white; font-size: 12px;
            padding: 4px 12px; border-radius: 20px;
            pointer-events: none; z-index: 30;
            display: none; white-space: nowrap;
        }

        /* 存档下拉菜单 */
        .save-dropdown-wrap {
            position: relative; display: none; align-items: center;
        }
        .save-dropdown-wrap.visible { display: inline-flex; }
        #btn-save-menu {
            background: none; border: 1px solid var(--matcha-green); border-radius: 6px;
            padding: 4px 10px; font-size: 12px; cursor: pointer; color: var(--matcha-green);
            white-space: nowrap; display: flex; align-items: center; gap: 4px;
            transition: background .15s, color .15s; font-family: inherit;
        }
        #btn-save-menu:hover { background: var(--matcha-green); color: white; }
        .save-dropdown-menu {
            position: absolute; top: calc(100% + 6px); right: 0;
            background: var(--matcha-card); border-radius: 10px;
            box-shadow: 0 4px 20px rgba(60,80,50,0.13);
            border: 1px solid var(--matcha-border); min-width: 140px; z-index: 1000;
            display: none; flex-direction: column; overflow: hidden;
        }
        .save-dropdown-menu.open { display: flex; }
        .save-menu-item {
            padding: 10px 16px; font-size: 13px; color: var(--matcha-text); cursor: pointer;
            display: flex; align-items: center; gap: 8px; white-space: nowrap;
            transition: background .12s;
        }
        .save-menu-item:hover { background: var(--matcha-accent-light); }
        .save-menu-item + .save-menu-item { border-top: 1px solid var(--matcha-border-light); }

        /* 读取存档弹窗 */
        #load-save-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44,58,40,0.3); display: none;
            justify-content: center; align-items: center; z-index: 9000;
        }
        #load-save-overlay.open { display: flex; }
        .load-save-modal {
            background: var(--matcha-card); border-radius: 16px;
            box-shadow: 0 4px 30px rgba(60,80,50,0.18);
            width: 440px; max-width: 94vw; max-height: 80vh;
            display: flex; flex-direction: column; overflow: hidden;
        }
        .load-save-header {
            padding: 18px 20px 14px; border-bottom: 1px solid var(--matcha-border-light);
            display: flex; align-items: center; justify-content: space-between;
        }
        .load-save-header h3 { margin: 0; font-size: 16px; font-weight: 700; color: var(--matcha-text); }
        #btn-close-load-save {
            background: none; border: none; font-size: 20px; cursor: pointer;
            color: var(--matcha-text-muted); line-height: 1; padding: 0 4px;
        }
        #btn-close-load-save:hover { color: var(--matcha-text); }
        .load-save-list {
            flex: 1; overflow-y: auto; padding: 10px 12px; display: flex;
            flex-direction: column; gap: 8px;
        }
        .save-slot-card {
            padding: 12px 14px; border: 1.5px solid var(--matcha-border); border-radius: 10px;
            cursor: pointer; background: var(--matcha-surface);
            transition: border-color .15s, background .15s;
            display: flex; align-items: center; justify-content: space-between; gap: 8px;
        }
        .save-slot-card:hover { border-color: var(--matcha-accent); background: var(--matcha-accent-light); }
        .save-slot-card.quick-save { border-color: #c09a30; background: var(--matcha-yellow-light); }
        .save-slot-card.quick-save:hover { background: #ede8c8; }
        .save-slot-info { flex: 1; min-width: 0; }
        .save-slot-name { font-size: 14px; font-weight: 600; color: var(--matcha-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .save-slot-meta { font-size: 11px; color: var(--matcha-text-muted); margin-top: 2px; }
        .save-slot-del {
            background: none; border: 1px solid #c0483a; color: #c0483a; border-radius: 5px;
            font-size: 11px; padding: 3px 7px; cursor: pointer; flex-shrink: 0;
            transition: background .12s, color .12s; font-family: inherit;
        }
        .save-slot-del:hover { background: #c0483a; color: white; }
        .load-save-empty { padding: 28px; text-align: center; color: var(--matcha-text-muted); font-size: 13px; }

        /* ── Toast 通知（右上角） ── */
        #toast-container {
            position: fixed; top: 16px; right: 16px;
            display: flex; flex-direction: column; gap: 8px;
            z-index: 99999; pointer-events: none;
        }
        .toast {
            display: flex; align-items: flex-start; gap: 10px;
            background: var(--matcha-card);
            border: 1px solid var(--matcha-border);
            border-left: 3px solid var(--matcha-accent);
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(44,58,40,0.13);
            padding: 11px 14px;
            min-width: 220px; max-width: 320px;
            pointer-events: all;
            animation: toast-in .22s ease;
        }
        .toast.toast-error { border-left-color: #c0483a; }
        .toast.toast-warn  { border-left-color: #b08a2a; }
        .toast.toast-info  { border-left-color: var(--matcha-accent); }
        .toast.toast-success { border-left-color: var(--matcha-green); }
        .toast-icon { font-size: 15px; line-height: 1.4; flex-shrink: 0; }
        .toast-body { flex: 1; }
        .toast-msg { font-size: 13px; color: var(--matcha-text); line-height: 1.5; }
        .toast-close {
            background: none; border: none; cursor: pointer; padding: 0;
            color: var(--matcha-text-muted); font-size: 15px; line-height: 1;
            flex-shrink: 0; margin-top: 1px;
        }
        .toast-close:hover { color: var(--matcha-text); }
        .toast.toast-out { animation: toast-out .2s ease forwards; }
        @keyframes toast-in {
            from { opacity: 0; transform: translateX(24px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes toast-out {
            from { opacity: 1; transform: translateX(0); }
            to   { opacity: 0; transform: translateX(24px); }
        }

        /* ── 自定义 confirm / prompt 弹窗 ── */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44,58,40,0.28);
            display: flex; justify-content: center; align-items: center;
            z-index: 99998;
            animation: modal-bg-in .15s ease;
        }
        @keyframes modal-bg-in { from { opacity:0; } to { opacity:1; } }
        .modal-box {
            background: var(--matcha-card); border-radius: 14px;
            box-shadow: 0 8px 32px rgba(44,58,40,0.18);
            border: 1px solid var(--matcha-border);
            width: 320px; max-width: 90vw;
            padding: 24px 22px 18px;
            display: flex; flex-direction: column; gap: 14px;
            animation: modal-in .18s ease;
        }
        @keyframes modal-in {
            from { opacity:0; transform: scale(.95) translateY(6px); }
            to   { opacity:1; transform: scale(1) translateY(0); }
        }
        .modal-msg {
            font-size: 14px; color: var(--matcha-text); line-height: 1.6; margin: 0;
        }
        .modal-input {
            padding: 11px 13px; border: 1.5px solid var(--matcha-border); border-radius: 9px;
            font-size: 14px; outline: none; background: var(--matcha-surface);
            color: var(--matcha-text); font-family: inherit; width: 100%; box-sizing: border-box;
            transition: border-color .18s;
        }
        .modal-input:focus { border-color: var(--matcha-accent); background: #fff; }
        .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
        .modal-btn {
            padding: 8px 18px; border: none; border-radius: 8px; font-size: 13px;
            font-weight: 600; cursor: pointer; font-family: inherit;
            transition: opacity .15s, transform .12s;
        }
        .modal-btn:hover { opacity: .88; transform: translateY(-1px); }
        .modal-btn:active { transform: translateY(0); }
        .modal-btn-cancel { background: var(--matcha-surface); color: var(--matcha-text-secondary); border: 1px solid var(--matcha-border); }
        .modal-btn-cancel:hover { opacity:1; background: var(--matcha-accent-light); }
        .modal-btn-ok { background: var(--matcha-accent); color: white; }
        .modal-btn-ok.danger { background: #c0483a; }
    </style>
</head>

<script src="https://unpkg.com/quill-emoji/dist/quill-emoji.js"></script>

<script>
const statusSpan = document.getElementById('status');
const siteDisplay = document.getElementById('site-display');
const docDisplay = document.getElementById('doc-display');
const logPanel = document.getElementById('log');
const authOverlay = document.getElementById('auth-overlay');
const btnLogout = document.getElementById('btn-logout');
const roomChoiceOverlay = document.getElementById('room-choice-overlay');
const roomCreatedOverlay = document.getElementById('room-created-overlay');
const joinRoomOverlay = document.getElementById('join-room-overlay');
const myRoomsOverlay = document.getElementById('my-rooms-overlay');
const myRoomsList    = document.getElementById('my-rooms-list');
const myRoomsLoading = document.getElementById('my-rooms-loading');
const inviteCodeDisplay = document.getElementById('invite-code-display');
const inputInviteCode = document.getElementById('input-invite-code');

function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('tab-login').classList.toggle('active', isLogin);
    document.getElementById('tab-register').classList.toggle('active', !isLogin);
    document.getElementById('form-login').style.display = isLogin ? 'flex' : 'none';
    document.getElementById('form-register').style.display = isLogin ? 'none' : 'flex';
}

let currentRoom = JSON.parse(localStorage.getItem('currentRoom') || 'null');

Quill.register('modules/cursors', QuillCursors);

var quill = new Quill('#editor-container', {
    modules: {
        toolbar: {
            container: '#quill-toolbar',
            handlers: { 'emoji': function() {} }
        },
        "emoji-toolbar": true, "emoji-shortname": true,
        cursors: { transformOnTextChange: true, hideDelayMs: 5000, hideSpeedMs: 300 }
    },
    placeholder: '', theme: 'snow'
});

const cursorsModule = quill.getModule('cursors');

// 手动管理 placeholder
const editorEl = document.querySelector('#editor-container .ql-editor');
const placeholderEl = document.createElement('div');
placeholderEl.id = 'ql-custom-placeholder';
placeholderEl.innerText = '在这里开始协同创作...';
editorEl.parentElement.style.position = 'relative';
editorEl.parentElement.appendChild(placeholderEl);

function updatePlaceholder() {
    const len = quill.getLength();
    placeholderEl.style.display = len <= 1 ? 'block' : 'none';
}
function updatePlaceholderDeferred() { setTimeout(updatePlaceholder, 0); }
quill.on('text-change', updatePlaceholderDeferred);
editorEl.addEventListener('compositionstart', () => { placeholderEl.style.display = 'none'; });
editorEl.addEventListener('compositionend', updatePlaceholder);
editorEl.addEventListener('input', updatePlaceholder);
new MutationObserver(updatePlaceholderDeferred).observe(editorEl, { childList: true, subtree: true, characterData: true });
updatePlaceholder();

let mySiteId = localStorage.getItem('mySiteId') ? parseInt(localStorage.getItem('mySiteId')) : null;
let myUsername = localStorage.getItem('myUsername') || null;
let myPassword = localStorage.getItem('myPassword') || null;

let docState = [{ id: "p@0", char: "\n", attributes: {} }];
let isApplyingRemoteChange = false;

const colorPalette = ['#f56223', '#ffc107', '#00a8ff', '#00b894', '#9b59b6', '#e84393'];
function getUserColor(siteId) { return colorPalette[siteId % colorPalette.length]; }

function addLog(text, isOwn = false) {
    let type = 'info';
    if (/^✅/.test(text) || /^🎉/.test(text) || /^💾/.test(text) || /^📂/.test(text)) type = 'success';
    else if (/^⚠️/.test(text) || /^❌/.test(text)) type = 'error';
    else if (isOwn) type = 'success';
    showToast(text, type, 4000);
}

function generatePosBetween(left, right) {
    let pos = ""; let i = 0;
    while (true) {
        let l = i < left.length ? left.charCodeAt(i) : 96;
        let r = i < right.length ? right.charCodeAt(i) : 123;
        if (r - l > 1) { pos += String.fromCharCode(Math.floor((l + r) / 2)); return pos; }
        else { pos += String.fromCharCode(l); }
        i++;
    }
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
              .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

const ws = new WebSocket("ws://39.102.113.202:9002");

ws.onopen = () => {
    if (myUsername && myPassword) {
        authOverlay.style.display = 'none';
        statusSpan.innerText = "自动登录中 🟡";
        // 静默自动登录，不弹通知
        ws.send(JSON.stringify({ type: "login", username: myUsername, password: myPassword }));
    } else {
        statusSpan.innerText = "已连网，请登录 🟡";
        // 静默等待登录
    }
};

document.getElementById('btn-register').onclick = () => {
    myUsername = document.getElementById('input-username-reg').value;
    myPassword = document.getElementById('input-password-reg').value;
    if(!myUsername || !myPassword) return showToast('用户名和密码不能为空！', 'warn');
    ws.send(JSON.stringify({ type: "register", username: myUsername, password: myPassword }));
};

document.getElementById('btn-login').onclick = () => {
    myUsername = document.getElementById('input-username').value;
    myPassword = document.getElementById('input-password').value;
    if(!myUsername || !myPassword) return showToast('用户名和密码不能为空！', 'warn');
    ws.send(JSON.stringify({ type: "login", username: myUsername, password: myPassword }));
};

btnLogout.onclick = () => {
    showConfirm('确定要退出登录吗？', () => { localStorage.clear(); location.reload(); }, null, false);
};

document.getElementById('btn-leave-room').onclick = () => {
    localStorage.removeItem('currentRoom');
    localStorage.removeItem('mySiteId');
    location.reload();
};

const roomNameOverlay = document.getElementById('room-name-overlay');
const inviteTypeOverlay = document.getElementById('invite-type-overlay');
const inviteTypeHint = document.getElementById('invite-type-hint');
const genInviteOverlay = document.getElementById('gen-invite-overlay');
const genInviteCodeDisplay = document.getElementById('gen-invite-code-display');
const genInviteTypeHint = document.getElementById('gen-invite-type-hint');
const btnGenInvite = document.getElementById('btn-gen-invite');
const btnRenameRoom = document.getElementById('btn-rename-room');

btnRenameRoom.onclick = () => {
    const current = currentRoom ? (currentRoom.room_name || '') : '';
    showPrompt('请输入新的房间名称：', current, (newName) => {
        if (newName === null || newName === undefined) return;
        if (!newName.trim()) return showToast('房间名称不能为空！', 'warn');
        ws.send(JSON.stringify({ type: "rename_room", room_name: newName.trim() }));
    });
};

let isGenInviteMode = false;

document.getElementById('btn-create-room').onclick = () => {
    roomChoiceOverlay.style.display = 'none';
    roomNameOverlay.style.display = 'flex';
    document.getElementById('input-room-name').value = '';
};

document.getElementById('btn-confirm-room-name').onclick = () => {
    const name = document.getElementById('input-room-name').value.trim();
    if (!name) return showToast('请输入房间名称！', 'warn');
    roomNameOverlay.dataset.roomName = name;
    roomNameOverlay.style.display = 'none';
    isGenInviteMode = false;
    inviteTypeOverlay.style.display = 'flex';
    document.getElementById('timed-options').style.display = 'none';
};

document.getElementById('btn-back-from-name').onclick = () => {
    roomNameOverlay.style.display = 'none';
    roomChoiceOverlay.style.display = 'flex';
};

btnGenInvite.onclick = () => {
    isGenInviteMode = true;
    inviteTypeOverlay.style.display = 'flex';
    document.getElementById('timed-options').style.display = 'none';
};

function sendCreateOrGenInvite(invite_type, extra) {
    if (isGenInviteMode) {
        ws.send(JSON.stringify({ type: "gen_invite", invite_type, ...extra }));
    } else {
        const room_name = roomNameOverlay.dataset.roomName || '未命名房间';
        ws.send(JSON.stringify({ type: "create_room", room_name, invite_type, ...extra }));
    }
}

document.getElementById('btn-invite-once').onclick = () => {
    inviteTypeOverlay.style.display = 'none';
    sendCreateOrGenInvite("once", {});
};

document.getElementById('btn-invite-timed').onclick = () => {
    const timedOpts = document.getElementById('timed-options');
    timedOpts.style.display = timedOpts.style.display === 'none' ? 'flex' : 'none';
    timedOpts.style.flexDirection = 'column';
    timedOpts.style.gap = '10px';
};

document.getElementById('btn-confirm-timed').onclick = () => {
    const hours = parseInt(document.getElementById('select-hours').value);
    inviteTypeOverlay.style.display = 'none';
    sendCreateOrGenInvite("timed", { expire_hours: hours });
};

document.getElementById('btn-invite-permanent').onclick = () => {
    inviteTypeOverlay.style.display = 'none';
    sendCreateOrGenInvite("permanent", {});
};

document.getElementById('btn-back-room-choice').onclick = () => {
    inviteTypeOverlay.style.display = 'none';
    if (isGenInviteMode) return;
    roomNameOverlay.style.display = 'flex';
};

document.getElementById('btn-go-back-login').onclick = () => {
    roomChoiceOverlay.style.display = 'none';
    authOverlay.style.display = 'flex';
};

document.getElementById('btn-copy-code').onclick = () => {

// shapes: { id, type, x, y, w, h, siteId }
let shapes = [];
let selectedShapeId = null;
let currentTool = null;  // 非 null 时处于放置模式

// 当前拖拽/缩放状态
let activeDragShape = null;   // { shapeId, mode: 'move'|'resize', corner, startMX, startMY, origX, origY, origW, origH, offX, offY }

const canvas = document.getElementById('shape-canvas');
const ctx = canvas.getContext('2d');
const shapeHint = document.getElementById('shape-hint');

// shape-canvas 只用于放置模式下显示十字光标，平时隐藏
function resizeCanvas() {
    const wrap = document.getElementById('editor-wrap');
    canvas.width = wrap.clientWidth;
    canvas.height = wrap.clientHeight;
}
new ResizeObserver(resizeCanvas).observe(document.getElementById('editor-wrap'));

function generateShapeId() {
    return `sh_${Date.now()}_${mySiteId || 0}_${Math.floor(Math.random()*9999)}`;
}
function getShapeColor(siteId) { return colorPalette[(siteId || 0) % colorPalette.length]; }
function setShapeHint(msg) {
    shapeHint.style.display = msg ? 'block' : 'none';
    shapeHint.innerText = msg || '';
}

function drawShapeOnEl(s) {
    const el = document.getElementById('shape-dom-' + s.id);
    if (!el) return;
    const cv = el.querySelector('canvas');
    if (!cv) return;
    const w = s.w, h = s.h;
    if (!w || !h) return;
    cv.width = w; cv.height = h;
    const c = cv.getContext('2d');
    c.clearRect(0, 0, w, h);
    const color = getShapeColor(s.siteId);
    c.strokeStyle = color;
    c.lineWidth = 2;
    c.setLineDash([]);
    c.beginPath();
    if (s.type === 'rect') {
        c.rect(1, 1, w - 2, h - 2);
    } else if (s.type === 'circle') {
        c.ellipse(w/2, h/2, w/2 - 1, h/2 - 1, 0, 0, Math.PI*2);
    } else if (s.type === 'triangle') {
        c.moveTo(w/2, 1); c.lineTo(w - 1, h - 1); c.lineTo(1, h - 1); c.closePath();
    } else if (s.type === 'star') {
        const cx = w/2, cy = h/2;
        const R = Math.min(w, h) / 2 - 2;
        const r = R / 2.4;
        let rot = -Math.PI / 2;
        const step = Math.PI / 5;
        c.moveTo(cx + R * Math.cos(rot), cy + R * Math.sin(rot));
        for (let i = 0; i < 5; i++) {
            rot += step; c.lineTo(cx + r * Math.cos(rot), cy + r * Math.sin(rot));
            rot += step; c.lineTo(cx + R * Math.cos(rot), cy + R * Math.sin(rot));
        }
        c.closePath();
    }
    c.stroke();
}

function getOrCreateShapeEl(s) {
    let el = document.getElementById('shape-dom-' + s.id);
    if (!el) {
        el = document.createElement('div');
        el.id = 'shape-dom-' + s.id;
        el.className = 'shape-el';
        el.innerHTML = `<canvas></canvas>
            <div class="shape-handle tl" data-corner="tl"></div>
            <div class="shape-handle tr" data-corner="tr"></div>
            <div class="shape-handle bl" data-corner="bl"></div>
            <div class="shape-handle br" data-corner="br"></div>`;

        // 拖动图形体
        el.addEventListener('mousedown', (e) => {
            if (e.target.classList.contains('shape-handle')) return;
            if (currentTool) return;
            e.preventDefault();
            e.stopPropagation();
            selectShape(s.id);
            activeDragShape = { shapeId: s.id, mode: 'move',
                startMX: e.clientX, startMY: e.clientY,
                origX: s.x, origY: s.y, origW: s.w, origH: s.h };
            el.style.cursor = 'grabbing';
        });
        // 双击删除
        el.addEventListener('dblclick', (e) => {
            if (e.target.classList.contains('shape-handle')) return;
            e.stopPropagation();
            removeShape(s.id, true);
        });
        // 缩放把手
        el.querySelectorAll('.shape-handle').forEach(handle => {
            handle.addEventListener('mousedown', (e) => {
                e.preventDefault();
                e.stopPropagation();
                activeDragShape = { shapeId: s.id, mode: 'resize',
                    corner: handle.dataset.corner,
                    startMX: e.clientX, startMY: e.clientY,
                    origX: s.x, origY: s.y, origW: s.w, origH: s.h };
            });
        });

        document.getElementById('editor-wrap').appendChild(el);
    }
    el.style.left = s.x + 'px';
    el.style.top  = (s.y - editorEl.scrollTop) + 'px';
    el.style.width  = s.w + 'px';
    el.style.height = s.h + 'px';
    return el;
}

function syncShapeEl(s) {
    const el = getOrCreateShapeEl(s);
    drawShapeOnEl(s);
    return el;
}

function removeShapeEl(id) {
    const el = document.getElementById('shape-dom-' + id);
    if (el) el.remove();
}

function selectShape(id) {
    // 取消上一个
    if (selectedShapeId && selectedShapeId !== id) {
        const prev = document.getElementById('shape-dom-' + selectedShapeId);
        if (prev) prev.classList.remove('selected');
    }
    selectedShapeId = id;
    if (id) {
        const el = document.getElementById('shape-dom-' + id);
        if (el) { el.classList.add('selected'); el.style.cursor = 'grab'; }
        setShapeHint('拖动移动 · 拖角点缩放 · 双击删除');
    } else {
        setShapeHint('');
    }
}

function deselectShape() {
    if (selectedShapeId) {
        const el = document.getElementById('shape-dom-' + selectedShapeId);
        if (el) el.classList.remove('selected');
    }
    selectedShapeId = null;
    setShapeHint('');
}

function removeShape(id, broadcast) {
    const idx = shapes.findIndex(s => s.id === id);
    if (idx !== -1) {
        const type = shapes[idx].type;
        shapes.splice(idx, 1);
        removeShapeEl(id);
        if (id === selectedShapeId) deselectShape();
        if (broadcast) {
            ws.send(JSON.stringify({ type: "shape_delete", id }));
            addLog(`🗑️ 删除图形 [${type}]`, true);
        }
        updateTextWrap();
    }
}

// 全局 mousemove / mouseup 处理拖拽和缩放
document.addEventListener('mousemove', (e) => {
    if (!activeDragShape) return;
    const { shapeId, mode, corner, startMX, startMY, origX, origY, origW, origH } = activeDragShape;
    const s = shapes.find(s => s.id === shapeId);
    if (!s) return;
    const dx = e.clientX - startMX;
    const dy = e.clientY - startMY;
    if (mode === 'move') {
        s.x = origX + dx;
        s.y = origY + dy;
    } else {
        // resize
        if (corner === 'br') { s.w = Math.max(30, origW + dx); s.h = Math.max(30, origH + dy); }
        else if (corner === 'tr') { s.w = Math.max(30, origW + dx); s.y = origY + dy; s.h = Math.max(30, origH - dy); }
        else if (corner === 'bl') { s.x = origX + dx; s.w = Math.max(30, origW - dx); s.h = Math.max(30, origH + dy); }
        else if (corner === 'tl') { s.x = origX + dx; s.y = origY + dy; s.w = Math.max(30, origW - dx); s.h = Math.max(30, origH - dy); }
    }
    syncShapeEl(s);
    requestAnimationFrame(updateTextWrap);
});

document.addEventListener('mouseup', (e) => {
    if (!activeDragShape) return;
    const { shapeId } = activeDragShape;
    const s = shapes.find(s => s.id === shapeId);
    if (s) {
        ws.send(JSON.stringify({ type: "shape_move", id: s.id, x: s.x, y: s.y, w: s.w, h: s.h }));
        updateTextWrap();
    }
    activeDragShape = null;
    const el = document.getElementById('shape-dom-' + shapeId);
    if (el) el.style.cursor = 'grab';
});

// 点击 editor-wrap 空白区域时取消选中图形（不影响文字选择）
document.getElementById('editor-wrap').addEventListener('mousedown', (e) => {
    if (e.target.closest('.shape-el')) return;
    if (currentTool) return;
    deselectShape();
});

// 放置模式：用覆盖 canvas 捕获点击
canvas.addEventListener('click', (e) => {
    if (!currentTool) return;
    const wrapRect = document.getElementById('editor-wrap').getBoundingClientRect();
    const editorRect = editorEl.getBoundingClientRect();
    const ex = e.clientX - wrapRect.left;
    const ey = e.clientY - wrapRect.top;

    const s = {
        id: generateShapeId(), type: currentTool,
        x: Math.round(ex - 60),
        y: Math.round(ey - 40 + editorEl.scrollTop),
        w: 120, h: 80,
        siteId: mySiteId || 0
    };
    shapes.push(s);
    syncShapeEl(s);
    ws.send(JSON.stringify({ type: "shape_add", shape: s }));
    addLog(`➕ 插入图形 [${s.type}]`, true);
    cancelShapeTool();
    selectShape(s.id);
    updateTextWrap();
});

function selectShapeTool(type) {
    deselectShape();
    currentTool = type;
    ['rect','circle','triangle','star'].forEach(t =>
        document.getElementById('stb-'+t)?.classList.toggle('active', t === type));
    document.getElementById('stb-cancel').style.display = 'flex';
    document.getElementById('shape-mode-hint').style.display = 'inline';
    document.getElementById('shape-mode-hint').innerText = '点击编辑器放置图形';
    canvas.classList.add('placing');
    resizeCanvas();
    setShapeHint('点击编辑器放置图形');
}

function cancelShapeTool() {
    currentTool = null;
    ['rect','circle','triangle','star'].forEach(t =>
        document.getElementById('stb-'+t)?.classList.remove('active'));
    document.getElementById('stb-cancel').style.display = 'none';
    document.getElementById('shape-mode-hint').style.display = 'none';
    canvas.classList.remove('placing');
    setShapeHint('');
}

function updateTextWrap() {
    const lines = editorEl.querySelectorAll('p, h1, h2, h3, li');
    if (!shapes.length) {
        lines.forEach(line => {
            line.style.paddingLeft = '';
            line.style.paddingRight = '';
        });
        return;
    }

    // 图形用 DOM 元素的视口坐标（getBoundingClientRect），行也用视口坐标
    // 两者直接在视口坐标系中比较，无需任何转换
    const editorRect = editorEl.getBoundingClientRect();
    const editorL = editorRect.left;
    const editorR = editorRect.right;
    const editorW = editorEl.clientWidth;
    const editorMidX = editorL + editorW / 2;
    const MARGIN = 8;

    // 取图形 DOM 元素的视口坐标
    const shapeViewRects = shapes.map(s => {
        const el = document.getElementById('shape-dom-' + s.id);
        if (!el) return null;
        const r = el.getBoundingClientRect();
        return { top: r.top, bottom: r.bottom, left: r.left, right: r.right,
                 centerX: (r.left + r.right) / 2 };
    }).filter(Boolean);

    if (!shapeViewRects.length) return;

    // 先清掉旧 padding，回流后再测量
    lines.forEach(line => { line.style.paddingLeft = ''; line.style.paddingRight = ''; });
    void editorEl.offsetHeight;

    lines.forEach(line => {
        const lr = line.getBoundingClientRect();
        let leftBlock = 0, rightBlock = 0;

        shapeViewRects.forEach(sr => {
            // 视口坐标下垂直重叠检测
            if (lr.bottom <= sr.top || lr.top >= sr.bottom) return;

            if (sr.centerX <= editorMidX) {
                // 图形偏左 → paddingLeft 把文字推到图形右边
                const needed = sr.right - editorL + MARGIN;
                if (needed > leftBlock) leftBlock = needed;
            } else {
                // 图形偏右 → paddingRight 把文字推到图形左边
                const needed = editorR - sr.left + MARGIN;
                if (needed > rightBlock) rightBlock = needed;
            }
        });

        line.style.paddingLeft  = leftBlock  > 0 ? leftBlock  + 'px' : '';
        line.style.paddingRight = rightBlock > 0 ? rightBlock + 'px' : '';
    });
}

// 滚动时同步所有图形 DOM 位置（s.y 是内容坐标，显示时减 scrollTop）
function syncAllShapePositions() {
    shapes.forEach(s => {
        const el = document.getElementById('shape-dom-' + s.id);
        if (el) el.style.top = (s.y - editorEl.scrollTop) + 'px';
    });
}

// 监听内容和滚动变化以持续同步环绕
quill.on('text-change', () => { requestAnimationFrame(updateTextWrap); });
editorEl.addEventListener('scroll', () => {
    syncAllShapePositions();
    updateTextWrap();
});


function applyRemoteShape(data) {
    if (data.type === 'shape_add') {
        if (!shapes.find(s => s.id === data.shape.id)) {
            shapes.push(data.shape);
            syncShapeEl(data.shape);
            updateTextWrap();
        }
    } else if (data.type === 'shape_move') {
        const s = shapes.find(s => s.id === data.id);
        if (s) { s.x = data.x; s.y = data.y; s.w = data.w; s.h = data.h; syncShapeEl(s); updateTextWrap(); }
    } else if (data.type === 'shape_delete') {
        const idx = shapes.findIndex(s => s.id === data.id);
        if (idx !== -1) {
            removeShapeEl(data.id);
            shapes.splice(idx, 1);
            updateTextWrap();
        }
    }
}

function handleMessage(data) {
    if (data.type === "kicked") {
        alert(data.msg);
        localStorage.clear();
        location.reload();
        return;
    }

    // 图形消息直接处理
    if (['shape_add','shape_move','shape_delete'].includes(data.type)) {
        applyRemoteShape(data);
        return;
    }

    if (data.type === "register_res") {
        showToast(data.msg, data.success !== false ? 'success' : 'error');
        if (data.success !== false) switchTab('login');
    }
    else if (data.type === "login_res") {
        if (data.success) {
            authOverlay.style.display = 'none';
            btnLogout.style.display = 'inline-block';
            localStorage.setItem('myUsername', myUsername);
            localStorage.setItem('myPassword', myPassword);
            siteDisplay.innerText = `👤 ${myUsername}`;
            addLog(`✅ 登录成功！欢迎回来，${myUsername}！`, true);
            if (currentRoom) {
                statusSpan.innerText = "重新加入房间中 🟡";
                ws.send(JSON.stringify({ type: "join", doc_id: currentRoom.doc_id, requested_site_id: mySiteId || 0 }));
            } else {
                statusSpan.innerText = "已登录，选择房间 🟡";
                roomChoiceOverlay.style.display = 'flex';
            }
        } else {
            showToast(data.msg, 'error');
            authOverlay.style.display = 'flex';
            localStorage.clear();
        }
    }
    else if (data.type === "create_room_res") {
        if (data.success) {
            currentRoom = { doc_id: data.doc_id, code: data.code, room_name: data.room_name };
            localStorage.setItem('currentRoom', JSON.stringify(currentRoom));
            roomChoiceOverlay.style.display = 'none';
            inviteTypeOverlay.style.display = 'none';
            inviteCodeDisplay.innerText = data.code;
            const hints = {
                once: '仅限一次使用，用完即失效',
                timed: data.expires_at ? `有效至 ${new Date(data.expires_at * 1000).toLocaleString()}` : '限时有效',
                permanent: '永久有效，可无限次使用'
            };
            inviteTypeHint.innerText = hints[data.invite_type] || '';
            roomCreatedOverlay.style.display = 'flex';
            addLog(`🎉 房间「${data.room_name}」已创建，邀请码: ${data.code}`, true);
        } else {
            showToast(data.msg, 'error');
        }
    }
    else if (data.type === "gen_invite_res") {
        if (data.success) {
            genInviteCodeDisplay.innerText = data.code;
            const hints = {
                once: '仅限一次使用，用完即失效',
                timed: data.expires_at ? `有效至 ${new Date(data.expires_at * 1000).toLocaleString()}` : '限时有效',
                permanent: '永久有效，可无限次使用'
            };
            genInviteTypeHint.innerText = hints[data.invite_type] || '';
            genInviteOverlay.style.display = 'flex';
            addLog(`🔑 新邀请码已生成: ${data.code}`, true);
        } else {
            showToast(data.msg || '生成邀请码失败', 'error');
        }
    }
    else if (data.type === "join_with_code_res") {
        if (data.success) {
            currentRoom = { doc_id: data.doc_id, room_name: data.room_name };
            localStorage.setItem('currentRoom', JSON.stringify(currentRoom));
            joinRoomOverlay.style.display = 'none';
            statusSpan.innerText = "进入房间中 🟡";
            docDisplay.innerText = `📄 ${data.room_name || data.doc_id}`;
            ws.send(JSON.stringify({ type: "join", doc_id: currentRoom.doc_id, requested_site_id: mySiteId || 0 }));
        } else {
            showToast(data.msg, 'error');
            inputInviteCode.value = '';
        }
    }
    else if (data.type === "get_my_rooms_res") {
        myRoomsLoading.style.display = 'none';
        if (!data.success) {
            myRoomsList.innerHTML = `<p class="flow-hint" style="color:#ff3b30;">${escapeHtml(data.msg || '加载失败')}</p>`;
            return;
        }
        if (!data.rooms || data.rooms.length === 0) {
            myRoomsList.innerHTML = '<p class="flow-hint">暂无历史房间记录</p>';
            return;
        }
        const nameCount = {};
        const nameIndex = {};
        data.rooms.forEach(r => { nameCount[r.room_name] = (nameCount[r.room_name] || 0) + 1; });
        data.rooms.forEach(room => {
            let displayName = room.room_name;
            if (nameCount[room.room_name] > 1) {
                nameIndex[room.room_name] = (nameIndex[room.room_name] || 0) + 1;
                displayName = `${room.room_name}(${nameIndex[room.room_name]})`;
            }
            const card = document.createElement('div');
            card.className = 'room-card';
            const joinedDate  = room.joined_at  ? new Date(room.joined_at  * 1000).toLocaleDateString('zh-CN') : '未知';
            const createdDate = room.created_at && room.created_at > 0
                ? new Date(room.created_at * 1000).toLocaleDateString('zh-CN') : '未知';
            card.innerHTML = `
                <div class="room-card-name">${escapeHtml(displayName)}</div>
                <div class="room-card-meta">
                    <span>创建者: ${escapeHtml(room.created_by || '未知')}</span>
                    <span>创建于: ${createdDate}</span>
                    <span>你加入于: ${joinedDate}</span>

                myRoomsOverlay.style.display = 'none';
                currentRoom = { doc_id: room.doc_id, room_name: room.room_name };

            };
            myRoomsList.appendChild(card);
        });
    }
    else if (data.type === "rejoin_room_res") {
        showToast(data.msg || '重新加入房间失败', 'error');
        myRoomsOverlay.style.display = 'flex';
    }
    else if (data.type === "rename_room_res") {
        if (data.success) {
            currentRoom.room_name = data.room_name;
            localStorage.setItem('currentRoom', JSON.stringify(currentRoom));
            docDisplay.innerText = `📄 ${data.room_name}`;
            addLog(`✏️ 房间已重命名为「${data.room_name}」`, true);
        } else {
            showToast(data.msg, 'error');
        }
    }
    else if (data.type === "get_room_members_res") {
        const list = document.getElementById('members-list');
        if (!data.success || !data.members || data.members.length === 0) {
            list.innerHTML = '<div class="member-item" style="color:#8a8a9a;">暂无成员记录</div>';
        } else {
            const statusOrder = { in_room: 0, online: 1, offline: 2 };
            const statusLabel = { in_room: '在本房间', online: '在线', offline: '离线' };
            const statusClass = { in_room: 'in-room', online: 'online', offline: 'offline' };
            const owner = data.members.find(m => m.is_owner);
            const others = data.members.filter(m => !m.is_owner)
                .sort((a, b) => (statusOrder[a.status] ?? 3) - (statusOrder[b.status] ?? 3));
            const sorted = owner ? [owner, ...others] : others;
            list.innerHTML = sorted.map(m => `
                <div class="member-item">
                    <span class="member-dot ${statusClass[m.status] || 'offline'}"></span>
                    <span>${escapeHtml(m.username)}${m.is_owner ? ' <span class="member-owner-tag">创建者</span>' : ''}</span>
                    <span class="member-status-label">${statusLabel[m.status] || '离线'}</span>
                </div>`).join('');
        }
    }
    else if (data.type === "save_snapshot_res") {
        if (data.success) {
            const label = data.is_quick ? '⚡ 快速存档已更新' : `💾 已保存存档「${data.name}」`;
            addLog(label, true);
        }
    }
    else if (data.type === "get_saves_res") {
        if (data.success) {
            cachedSaves = data.saves || [];
            if (pendingSaveAfterList) {
                pendingSaveAfterList = false;
                doSaveWithPrompt();
            } else {
                openLoadModal(cachedSaves);
            }
        }
    }
    else if (data.type === "load_save_applied") {
        applySnapshot({ docState: data.doc_state, shapes: data.shapes });
        document.getElementById('load-save-overlay').classList.remove('open');
        addLog(`📂 存档「${data.name}」已被 ${escapeHtml(data.applied_by)} 读取并应用`, true);
    }
    else if (data.type === "delete_save_res") {
        if (data.success) {
            const card = document.querySelector(`.save-slot-card[data-save-id="${data.save_id}"]`);
            if (card) card.remove();
            const list = document.getElementById('load-save-list');
            if (list && !list.querySelector('.save-slot-card'))
                list.innerHTML = '<div class="load-save-empty">暂无存档</div>';
        }
    }
    else if (data.type === "save_deleted") {
        const card = document.querySelector(`.save-slot-card[data-save-id="${data.save_id}"]`);
        if (card) card.remove();
        const list = document.getElementById('load-save-list');
        if (list && !list.querySelector('.save-slot-card'))
            list.innerHTML = '<div class="load-save-empty">暂无存档</div>';
    }
    else if (data.type === "init") {
        mySiteId = data.site_id;
        localStorage.setItem('mySiteId', mySiteId);
        if (data.room_name && currentRoom) {
            currentRoom.room_name = data.room_name;
            localStorage.setItem('currentRoom', JSON.stringify(currentRoom));
        }
        statusSpan.innerText = "已进入房间 🟢";
        statusSpan.classList.remove('waiting');
        statusSpan.classList.add('online');
        if (currentRoom) docDisplay.innerText = `📄 ${currentRoom.room_name || currentRoom.doc_id}`;
        siteDisplay.innerText = `👤 ${myUsername} (Site: ${mySiteId})`;
        btnGenInvite.style.display = 'inline-flex';
        btnRenameRoom.style.display = 'inline-flex';
        document.getElementById('btn-leave-room').style.display = 'inline-flex';
        document.getElementById('btn-members').style.display = 'inline-flex';
        resizeCanvas();
        showSaveBtn();
    }
    else if (data.type === "history_batch") {
        isApplyingRemoteChange = true;
        // 先构建完整 docState，排序一次
        for (const ev of data.events) {
            const evList = ev.type === "ops_batch" ? ev.ops : [ev];
            for (const e of evList) {
                if (e.type === "insert") {
                    docState.push({ id: e.id, char: e.char, attributes: e.attributes || {} });
                } else if (e.type === "delete") {
                    const idx = docState.findIndex(item => item.id === e.id);
                    if (idx !== -1) docState.splice(idx, 1);
                } else if (e.type === "format") {
                    const item = docState.find(item => item.id === e.id);
                    if (item) {
                        if (e.value === null || e.value === false) delete item.attributes[e.key];
                        else item.attributes[e.key] = e.value;
                    }
                } else if (e.type === "shape_add" || e.type === "shape_move" || e.type === "shape_delete") {
                    applyRemoteShape(e);
                }
            }
        }
        docState.sort((a, b) => a.id.localeCompare(b.id));
        // 用 setContents 一次性重建 Quill 内容
        const ops = [];
        for (const item of docState) {
            if (typeof item.char === 'string') {
                if (item.char.length > 0) {
                    const op = { insert: item.char };
                    if (Object.keys(item.attributes).length > 0) op.attributes = item.attributes;
                    ops.push(op);
                }
            } else {
                const op = { insert: item.char };
                if (Object.keys(item.attributes).length > 0) op.attributes = item.attributes;
                ops.push(op);
            }
        }
        if (ops.length > 0) quill.setContents({ ops }, 'silent');
        isApplyingRemoteChange = false;
    }
    else if (data.type === "ops_batch") {
        // 批量操作：先全部应用到 docState，再一次性重建 Quill
        isApplyingRemoteChange = true;
        for (const op of data.ops) {
            if (op.type === "insert") {
                docState.push({ id: op.id, char: op.char, attributes: op.attributes || {} });
            } else if (op.type === "delete") {
                const idx = docState.findIndex(item => item.id === op.id);
                if (idx !== -1) docState.splice(idx, 1);
            } else if (op.type === "format") {
                const item = docState.find(item => item.id === op.id);
                if (item) {
                    if (op.value === null || op.value === false) delete item.attributes[op.key];
                    else item.attributes[op.key] = op.value;
                }
            }
        }
        docState.sort((a, b) => a.id.localeCompare(b.id));
        const quillOps = [];
        for (const item of docState) {
            if (typeof item.char === 'string') {
                if (item.char.length > 0) {
                    const qop = { insert: item.char };
                    if (Object.keys(item.attributes).length > 0) qop.attributes = item.attributes;
                    quillOps.push(qop);
                }
            } else {
                const qop = { insert: item.char };
                if (Object.keys(item.attributes).length > 0) qop.attributes = item.attributes;
                quillOps.push(qop);
            }
        }
        if (quillOps.length > 0) quill.setContents({ ops: quillOps }, 'silent');
        isApplyingRemoteChange = false;
    }
    else if (data.type === "presence") {
        showToast(`${data.username || ('用户' + data.site_id)} 进入了文档`, 'info', 2500);
    }
    else if (data.type === "cursor") {
        if (data.site_id === mySiteId) return;
        let relativeIndex = 0;
        if (data.anchorId !== "start") {
            const foundIndex = docState.findIndex(item => item.id === data.anchorId);
            if (foundIndex !== -1) relativeIndex = foundIndex + 1;
        }
        const remoteName = data.username ? data.username : `神秘人 ${data.site_id}`;
        cursorsModule.createCursor(data.site_id.toString(), remoteName, getUserColor(data.site_id));
        cursorsModule.moveCursor(data.site_id.toString(), { index: relativeIndex, length: data.length });
    }
    else if (data.type === "insert") {
        isApplyingRemoteChange = true;
        docState.push({ id: data.id, char: data.char, attributes: data.attributes || {} });
        docState.sort((a, b) => a.id.localeCompare(b.id));
        const relativeIndex = docState.findIndex(item => item.id === data.id);
        if (typeof data.char === 'string') {
            if (data.char.length > 0) quill.insertText(relativeIndex, data.char, data.attributes || {}, 'silent');
        } else {
            const embedType = Object.keys(data.char)[0];
            const embedValue = data.char[embedType];
            quill.insertEmbed(relativeIndex, embedType, embedValue, 'silent');
        }
        isApplyingRemoteChange = false;
    }
    else if (data.type === "delete") {
        isApplyingRemoteChange = true;
        const targetIndex = docState.findIndex(item => item.id === data.id);
        if (targetIndex !== -1) {
            const deletedItem = docState.splice(targetIndex, 1)[0];
            const delLen = typeof deletedItem.char === 'string' ? deletedItem.char.length : 1;
            if (delLen > 0) quill.deleteText(targetIndex, delLen, 'silent');
        }
        isApplyingRemoteChange = false;
    }
    else if (data.type === "format") {
        isApplyingRemoteChange = true;
        const targetIndex = docState.findIndex(item => item.id === data.id);
        if (targetIndex !== -1) {
            const formatItem = docState[targetIndex];
            if (data.value === null || data.value === false) delete formatItem.attributes[data.key];
            else formatItem.attributes[data.key] = data.value;
            const formatLen = typeof formatItem.char === 'string' ? formatItem.char.length : 1;
            if (formatLen > 0) quill.formatText(targetIndex, formatLen, data.key, data.value, 'silent');
        }
        isApplyingRemoteChange = false;
    }
}

ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    if (data.type === "batch") {
        for (const msg of data.msgs) handleMessage(msg);
    } else {

    }
};

quill.on('selection-change', (range, oldRange, source) => {
    if (range && mySiteId) {
        let anchorId = "start";
        if (range.index > 0 && range.index <= docState.length) anchorId = docState[range.index - 1].id;
        ws.send(JSON.stringify({ type: "cursor", site_id: mySiteId, username: myUsername, anchorId: anchorId, length: range.length }));
    }
});

quill.on('text-change', (delta, oldDelta, source) => {
    if (source === 'silent' || !mySiteId || isApplyingRemoteChange) return;
    let currentIndex = 0;
    // 收集本次 text-change 产生的所有操作，批量发送
    const batchOps = [];
    delta.ops.forEach(op => {
        if (op.retain) {
            if (op.attributes) {
                const attrKeys = Object.keys(op.attributes);
                for (let i = 0; i < op.retain; i++) {
                    const targetRelIndex = currentIndex + i; if (targetRelIndex >= docState.length) break;
                    const charItem = docState[targetRelIndex];
                    attrKeys.forEach(key => {
                        const val = op.attributes[key];
                        if (val === null || val === false) delete charItem.attributes[key]; else charItem.attributes[key] = val;
                        batchOps.push({ type: "format", id: charItem.id, key: key, value: val });
                    });
                }
            }
            currentIndex += op.retain;
        } else if (op.insert) {
            let itemsToInsert = [];
            if (typeof op.insert === 'string') {
                const segmenter = new Intl.Segmenter('zh-CN', { granularity: 'grapheme' });
                const chars = Array.from(segmenter.segment(op.insert)).map(s => s.segment);
                chars.forEach(c => { itemsToInsert.push(c); for(let i = 1; i < c.length; i++) itemsToInsert.push(""); });
            } else { itemsToInsert = [op.insert]; }

            for (let i = 0; i < itemsToInsert.length; i++) {
                const item = itemsToInsert[i];
                const leftId = currentIndex > 0 ? docState[currentIndex - 1].id.split('@')[0] : "";
                const rightId = currentIndex < docState.length ? docState[currentIndex].id.split('@')[0] : "";
                const absoluteId = `${generatePosBetween(leftId, rightId)}@${mySiteId}`;
                const attrs = op.attributes || {};
                docState.splice(currentIndex, 0, { id: absoluteId, char: item, attributes: attrs });
                batchOps.push({ type: "insert", id: absoluteId, char: item, attributes: attrs });
                currentIndex++;
            }
        } else if (op.delete) {
            for (let i = 0; i < op.delete; i++) {
                if (currentIndex < docState.length) {
                    const delId = docState[currentIndex].id; docState.splice(currentIndex, 1);
                    batchOps.push({ type: "delete", id: delId });
                }
            }
        }
    });
    // 单条操作直接发，多条打包成 ops_batch 一次发送
    if (batchOps.length === 1) {
        ws.send(JSON.stringify(batchOps[0]));
    } else if (batchOps.length > 1) {
        ws.send(JSON.stringify({ type: "ops_batch", ops: batchOps }));
    }
});

function captureSnapshot() {
    return {
        docState: JSON.parse(JSON.stringify(docState)),
        shapes:   JSON.parse(JSON.stringify(shapes))
    };
}

function applySnapshot(snap) {
    docState.length = 0;
    (snap.docState || []).forEach(item => docState.push(item));

    isApplyingRemoteChange = true;
    const ops = [];
    for (const item of docState) {
        if (typeof item.char === 'string') {
            if (item.char.length > 0) {
                const op = { insert: item.char };
                if (Object.keys(item.attributes).length > 0) op.attributes = item.attributes;
                ops.push(op);
            }
        } else {
            const op = { insert: item.char };
            if (Object.keys(item.attributes).length > 0) op.attributes = item.attributes;
            ops.push(op);
        }
    }
    if (ops.length > 0) quill.setContents({ ops }, 'silent');
    else quill.setContents({ ops: [{ insert: '\n' }] }, 'silent');
    isApplyingRemoteChange = false;

    shapes.length = 0;
    // 清除所有旧图形 DOM
    document.getElementById('editor-wrap').querySelectorAll('.shape-el').forEach(el => el.remove());
    (snap.shapes || []).forEach(s => { shapes.push(s); syncShapeEl(s); });
}

let cachedSaves = [];

function uniqueSaveName(baseName) {
    const existing = new Set(cachedSaves.filter(s => !s.is_quick).map(s => s.name));
    if (!existing.has(baseName)) return baseName;
    let i = 1;
    while (existing.has(`${baseName}(${i})`)) i++;
    return `${baseName}(${i})`;
}

let pendingSaveAfterList = false;

function doSaveWithPrompt() {
    showPrompt('请输入存档名称（留空则使用"默认存档"）：', '', (input) => {
        if (input === null || input === undefined) return;
        const baseName = input.trim() || '默认存档';
        const name = uniqueSaveName(baseName);
        const snap = captureSnapshot();
        ws.send(JSON.stringify({
            type: "save_snapshot",
            name,
            doc_state: JSON.stringify(snap.docState),
            shapes: JSON.stringify(snap.shapes)
        }));
    });
}

let pendingOpenModal = false;

function openLoadModal(saves) {
    const overlay = document.getElementById('load-save-overlay');
    const list = document.getElementById('load-save-list');
    list.innerHTML = '';
    if (!saves || !saves.length) {
        list.innerHTML = '<div class="load-save-empty">暂无存档</div>';
        overlay.classList.add('open');
        return;
    }
    saves.forEach(save => {
        const card = document.createElement('div');
        card.className = 'save-slot-card' + (save.is_quick ? ' quick-save' : '');
        card.dataset.saveId = save.id;

        const dateStr = new Date(save.created_at * 1000).toLocaleString('zh-CN', {
            month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit'
        });

        card.innerHTML = `
            <div class="save-slot-info">
                <div class="save-slot-name">${escapeHtml(save.name)}${save.is_quick ? ' ⚡' : ''}</div>
                <div class="save-slot-meta">保存于 ${dateStr}，由 ${escapeHtml(save.created_by)} 创建</div>
            </div>
            <button class="save-slot-del">删除</button>`;

        card.addEventListener('click', (e) => {
            if (e.target.classList.contains('save-slot-del')) return;
            showConfirm(`确认读取存档「${save.name}」？\n当前未保存的进度将永久丢失，且房间内所有人的内容都将被覆盖。`, () => {
                ws.send(JSON.stringify({ type: "load_save", save_id: save.id }));
            }, null, true);
        });

        card.querySelector('.save-slot-del').onclick = (e) => {
            e.stopPropagation();
            showConfirm(`确认删除存档「${save.name}」？`, () => {
                ws.send(JSON.stringify({ type: "delete_save", save_id: save.id }));
            }, null, true);
        };

        list.appendChild(card);
    });
    overlay.classList.add('open');
}

function showToast(msg, type = 'info', duration = 3500) {
    const icons = { info: 'ℹ️', success: '✅', warn: '⚠️', error: '❌' };
    const container = document.getElementById('toast-container');
    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    el.innerHTML = `<span class="toast-icon">${icons[type] || 'ℹ️'}</span>
        <span class="toast-body"><span class="toast-msg">${msg}</span></span>
        <button class="toast-close" onclick="dismissToast(this.closest('.toast'))">✕</button>`;
    container.appendChild(el);
    const timer = setTimeout(() => dismissToast(el), duration);
    el._timer = timer;
}
function dismissToast(el) {
    if (!el || el._dismissed) return;
    el._dismissed = true;
    clearTimeout(el._timer);
    el.classList.add('toast-out');
    el.addEventListener('animationend', () => el.remove(), { once: true });
}

function showConfirm(msg, onOk, onCancel, danger = false) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `<div class="modal-box">
        <p class="modal-msg">${msg}</p>
        <div class="modal-btns">
            <button class="modal-btn modal-btn-cancel" id="_mc">取消</button>
            <button class="modal-btn modal-btn-ok${danger ? ' danger' : ''}" id="_mo">确认</button>
        </div>
    </div>`;
    document.body.appendChild(overlay);
    const close = () => overlay.remove();
    overlay.querySelector('#_mc').onclick = () => { close(); onCancel && onCancel(); };
    overlay.querySelector('#_mo').onclick = () => { close(); onOk && onOk(); };
    overlay.addEventListener('click', e => { if (e.target === overlay) { close(); onCancel && onCancel(); } });
    setTimeout(() => overlay.querySelector('#_mo').focus(), 50);
}

function showPrompt(msg, defaultVal, onOk, onCancel) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `<div class="modal-box">
        <p class="modal-msg">${msg}</p>
        <input class="modal-input" id="_mp" type="text" value="${defaultVal || ''}">
        <div class="modal-btns">
            <button class="modal-btn modal-btn-cancel" id="_mpc">取消</button>
            <button class="modal-btn modal-btn-ok" id="_mpo">确认</button>
        </div>
    </div>`;
    document.body.appendChild(overlay);
    const input = overlay.querySelector('#_mp');
    const close = () => overlay.remove();
    const confirm = () => { const v = input.value; close(); onOk && onOk(v); };
    overlay.querySelector('#_mpc').onclick = () => { close(); onCancel && onCancel(); };
    overlay.querySelector('#_mpo').onclick = confirm;
    input.addEventListener('keydown', e => { if (e.key === 'Enter') confirm(); if (e.key === 'Escape') { close(); onCancel && onCancel(); } });
    overlay.addEventListener('click', e => { if (e.target === overlay) { close(); onCancel && onCancel(); } });
    setTimeout(() => { input.focus(); input.select(); }, 50);
}
